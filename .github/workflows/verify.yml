name: Verify

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run verify

  runner-integration:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull pinned MCP image
        shell: bash
        run: |
          image=$(node -p "require('./templates/root/.agents/wiki-manager-contract.js').DEFAULT_IMAGE")
          docker pull "$image"
      - name: Exercise Docker and MCP runner
        run: npm run verify:runner
